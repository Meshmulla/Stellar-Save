name: Mutation Testing

on:
  push:
    branches: [ main, develop ]
  pull_request:

jobs:
  mutation-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-mutants
        run: cargo install cargo-mutants

      - name: Run mutation testing
        run: |
          cargo mutants \
            --file-pattern 'contracts/**/*.rs' \
            --output-json mutants-report.json \
            --minimum-score 75   # Start with 75%, raise over time

      - name: Check mutation score
        run: |
          SCORE=$(jq -r '.score' mutants-report.json)
          echo "Mutation Score: $SCORE%"
          
          if (( $(echo "$SCORE < 75" | bc -l) )); then
            echo "❌ Mutation score too low: $SCORE% (minimum 75%)"
            echo "Surviving mutants:"
            jq -r '.survivors[] | "  - \(.file):\(.line) \(.function)"' mutants-report.json
            exit 1
          else
            echo "✅ Mutation score passed: $SCORE%"
          fi